name: Pull request CI

on:
  pull_request:
    types: [reopened, opened, synchronize, ready_for_review]
    branches-ignore: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 👯‍♂️ Clone repository
        uses: actions/checkout@v5
      - name: 🔧 Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: 🔐 Enable Corepack
        run: corepack enable
        shell: bash

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 👮🏻‍♂️ Run lint
        id: lint
        run: pnpm lint:ci

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: 👯‍♂️ Clone repository
        uses: actions/checkout@v5
      - name: 🔧 Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: 🔐 Enable Corepack
        run: corepack enable
        shell: bash

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🧪 Run unit tests
        id: unit-tests
        run: pnpm test:unit
