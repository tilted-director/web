name: Deploy the app to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    name: 🏗️ Build on Node.js 24.x
    runs-on: ubuntu-latest

    steps:
      - name: 👯‍♂️ Clone repository
        uses: actions/checkout@v4
      - name: 🔧 Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: 🔐 Enable Corepack
        run: corepack enable
        shell: bash
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🧰 Build
        id: build
        run: pnpm build
      - name: 🗒️ Build report
        if: always()
        run: |
          echo "Node.js version: $(node -v)"
          if [[ ${{ steps.build.outcome }} == "success" ]]; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed"
          fi
      - name: 🔧 Setup pages
        id: pages
        uses: actions/configure-pages@v3
      - name: 📤 Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    needs: [build]
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync:
    name: 🔄 Sync main to development
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔀 Merge main into development
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin development
          git switch development
          git merge origin/main --no-edit -m "chore: sync main into development [skip ci]" || {
            echo "::error::Merge conflict detected — manual resolution required"
            git merge --abort
            exit 1
          }
          git push origin development

      - name: 🗒️ Merge report
        if: always()
        run: |
          case "${{ steps.merge.outcome }}" in
            success)   echo "✅ Successfully merged main into development" ;;
            failure)   echo "❌ Merge failed - manual resolution required" ;;
            skipped)   echo "⏭️ Merge step was skipped" ;;
            cancelled) echo "🚫 Merge was cancelled" ;;
          esac
