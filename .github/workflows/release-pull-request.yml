name: Release Pull request CI

on:
  pull_request:
    types: [reopened, opened, synchronize, ready_for_review]
    branches: [main]

jobs:
  check-title:
    name: 📝 Check PR title format
    runs-on: ubuntu-latest

    steps:
      - name: 👯‍♂️ Clone repository
        uses: actions/checkout@v5
      - name: 🔍 Validate PR title and version
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN="^release\(v([0-9]+\.[0-9]+\.[0-9]+)\):[[:space:]]+.+[[:space:]]\[[0-9]{4}\.[0-9]{2}\.[0-9]{2}\]$"

          if [[ $TITLE =~ $PATTERN ]]; then
            echo "✅ PR title format is correct: $TITLE"
            PR_VERSION="${BASH_REMATCH[1]}"
            echo "PR version extracted: $PR_VERSION"
            
            PACKAGE_VERSION=$(jq -r '.version' package.json)
            echo "Package.json version: $PACKAGE_VERSION"
            
            if [[ "$PR_VERSION" == "$PACKAGE_VERSION" ]]; then
              echo "✅ Version in PR title matches package.json"
            else
              echo "❌ Version mismatch!"
              echo "PR title version: $PR_VERSION"
              echo "package.json version: $PACKAGE_VERSION"
              exit 1
            fi
          else
            echo "❌ PR title format is incorrect"
            echo "Expected format: release(vX.Y.Z): Description [YYYY-MM-DD]"
            echo "Current title: $TITLE"
            exit 1
          fi

  build-test:
    name: 🏗️ Build on Node.js 24.x
    runs-on: ubuntu-latest
    needs: [check-title]

    steps:
      - name: 👯‍♂️ Clone repository
        uses: actions/checkout@v5
      - name: 🔧 Use Node.js 24.x
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: 🔐 Enable Corepack
        run: corepack enable
        shell: bash
      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🧰 Build
        id: build-test
        run: pnpm build
      - name: 🗒️ Build report
        if: always()
        run: |
          echo "Node.js version: $(node -v)"
          if [[ ${{ steps.build-test.outcome }} == "success" ]]; then
            echo "✅ Build succeeded"
          else
            echo "❌ Build failed"
          fi

  conclusion:
    name: 🏁 Conclusion
    runs-on: ubuntu-latest
    needs: [build-test, check-title]

    steps:
      - name: 🗒️ Final report
        run: |
          if [[ ${{ needs.build-test.result }} == "success" && ${{ needs.check-title.result }} == "success" ]]; then
            echo "✅ All checks passed. Ready for release."
          else
            echo "❌ Some checks failed. Please fix the issues before merging."
          fi
